services:
  api:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./data:/data            # SQLite database persists here
      - ./uploads:/app/uploads  # Temp upload dir
    env_file:
      - .env                    # All vars in .env are injected automatically
    environment:
      - PORT=3001
      - DATABASE_PATH=/data/events.db
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    restart: unless-stopped
